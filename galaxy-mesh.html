<script>
// ============================
// SPACE TRAVEL WARP EFFECT
// ============================
const warpCanvas = document.getElementById("warp");
const warpCtx = warpCanvas.getContext("2d");

warpCanvas.width = window.innerWidth;
warpCanvas.height = window.innerHeight;

let stars = [];
const starCount = 600;

class Star {
  constructor() { this.reset(); }

  reset() {
    this.x = Math.random() * warpCanvas.width - warpCanvas.width / 2;
    this.y = Math.random() * warpCanvas.height - warpCanvas.height / 2;
    this.z = Math.random() * warpCanvas.width;
  }

  update() {
    this.z -= 4;
    if (this.z <= 0) this.reset();
  }

  draw() {
    let px = (this.x / this.z) * warpCanvas.width + warpCanvas.width / 2;
    let py = (this.y / this.z) * warpCanvas.height + warpCanvas.height / 2;
    let size = (1 - this.z / warpCanvas.width) * 3;
    warpCtx.fillStyle = "white";
    warpCtx.fillRect(px, py, size, size);
  }
}

for (let i = 0; i < starCount; i++) stars.push(new Star());

function animateWarp() {
  warpCtx.fillStyle = "rgba(3, 9, 26, 0.35)";
  warpCtx.fillRect(0, 0, warpCanvas.width, warpCanvas.height);
  stars.forEach(s => { s.update(); s.draw(); });
  requestAnimationFrame(animateWarp);
}
animateWarp();


// ============================
// COLORFUL MESH
// ============================
const canvas = document.getElementById("mesh");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
const particleCount = 280;
let mouse = { x: null, y: null };

window.addEventListener("mousemove", e => {
  mouse.x = e.x;
  mouse.y = e.y;
});

const colors = [
  "rgba(0,180,255,0.7)",
  "rgba(50,100,255,0.7)",
  "rgba(0,220,200,0.7)",
  "rgba(80,0,255,0.7)",
  "rgba(0,150,255,0.7)"
];

class Particle {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.radius = Math.random() * 1.5 + 0.5;
    this.dx = (Math.random() - 0.5) * 1;
    this.dy = (Math.random() - 0.5) * 1;
    this.color = colors[Math.floor(Math.random() * colors.length)];
  }

  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.shadowBlur = 9;
    ctx.shadowColor = this.color;
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  update() {
    this.x += this.dx;
    this.y += this.dy;
    if (this.x > canvas.width || this.x < 0) this.dx *= -1;
    if (this.y > canvas.height || this.y < 0) this.dy *= -1;
    this.draw();
  }
}

function init() {
  particles = [];
  for (let i = 0; i < particleCount; i++) particles.push(new Particle());
}

function connect() {
  for (let a = 0; a < particles.length; a++) {
    for (let b = a + 1; b < particles.length; b++) {
      let dx = particles[a].x - particles[b].x;
      let dy = particles[a].y - particles[b].y;
      let dist = dx * dx + dy * dy;
      if (dist < 17000) {
        ctx.strokeStyle = "rgba(100,160,255,0.12)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(particles[a].x, particles[a].y);
        ctx.lineTo(particles[b].x, particles[b].y);
        ctx.stroke();
      }
    }

    if (mouse.x && mouse.y) {
      let dx = mouse.x - particles[a].x;
      let dy = mouse.y - particles[a].y;
      let dist = dx * dx + dy * dy;
      if (dist < 30000) {
        particles[a].x += dx * 0.015;
        particles[a].y += dy * 0.015;
      }
    }
  }
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => p.update());
  connect();
  requestAnimationFrame(animate);
}

init();
animate();

window.addEventListener("resize", () => {
  warpCanvas.width = window.innerWidth;
  warpCanvas.height = window.innerHeight;
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  init();
});
</script>
